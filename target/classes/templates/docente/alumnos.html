<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Consulta Alumnos')}"></head>
<body>
    <div th:replace="~{fragments/layout :: main(~{::section})}">
        <section th:fragment="section">
        <div class="card">
            <div class="card-header">
                <span class="card-title"><i class="fas fa-search"></i> Buscar Alumno por Cedula</span>
            </div>
            <div class="card-body">
                <form th:action="@{/docente/alumnos/buscar}" method="get" class="filter-bar">
                    <div class="form-group" style="flex:1;">
                        <label class="form-label">Numero de Cedula *</label>
                        <input type="text" name="cedula" class="form-control" placeholder="Ingrese la cedula del alumno" required>
                    </div>
                    <div class="form-group" style="flex:0;">
                        <label class="form-label">&nbsp;</label>
                        <button type="submit" class="btn btn-primary"><i class="fas fa-search"></i> Buscar</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="card-title"><i class="fas fa-list"></i> Listado de Alumnos - Solo Lectura</span>
            </div>
            <div class="card-body">
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Codigo</th>
                                <th>Nombre</th>
                                <th>Programa</th>
                                <th>Semestre</th>
                                <th>Correo</th>
                                <th>Estado</th>
                                <th>Puntaje</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="a : ${alumnos}">
                                <td th:text="${a.codigo}">2024001</td>
                                <td th:text="${a.nombre}">Juan Perez</td>
                                <td th:text="${a.programa}">Ing. Sistemas</td>
                                <td th:text="${a.semestre}">5</td>
                                <td th:text="${a.correo}">juan@mail.com</td>
                                <td>
                                    <span th:if="${a.estado == 'ACTIVO'}" class="badge badge-activo">Activo</span>
                                    <span th:if="${a.estado == 'ANULADO'}" class="badge badge-danger">Examen Anulado</span>
                                    <span th:if="${a.estado == 'INACTIVO'}" class="badge badge-inactivo">Inactivo</span>
                                    <span th:if="${a.estado == 'PENDIENTE_PAGO'}" class="badge badge-pendiente">Pendiente Pago</span>
                                </td>
                                <td>
                                    <span th:if="${a.nota != null and a.nota.publicado}" th:text="${a.nota.getPuntajeGlobal()}" style="font-weight:700;color:var(--primary);">1500</span>
                                    <span th:unless="${a.nota != null and a.nota.publicado}" style="color:var(--gray);">Sin notas</span>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(alumnos)}">
                                <td colspan="7" class="empty-state">
                                    <div class="empty-state-icon"><i class="fas fa-user-graduate"></i></div>
                                    <h3>No hay alumnos en su facultad</h3>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>
    </div>
</body>
</html>

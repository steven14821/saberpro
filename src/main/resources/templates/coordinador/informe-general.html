<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Informe General de Estudiantes')}"></head>
<body>
    <div th:replace="~{fragments/layout :: main(~{::section})}">
        <section th:fragment="section">
        <div class="card">
            <div class="card-header">
                <span class="card-title"><i class="fas fa-list-alt"></i> Informe General de Estudiantes (Saber Pro)</span>
                <button class="btn btn-secondary" onclick="window.print()">
                    <i class="fas fa-print"></i> Imprimir
                </button>
            </div>
            <div class="card-body">
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Documento</th>
                                <th>Nombre Completo</th>
                                <th>Programa</th>
                                <th>Global</th>
                                <th>Ingles</th>
                                <th>Form. Proyectos</th>
                                <th>Pens. Cientifico</th>
                                <th>Dis. Software</th>
                                <th>Estado</th>
                                <th>Perfil</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="n, stat : ${notas}">
                                <td th:text="${stat.count}">1</td>
                                <td th:text="${n.alumno.cedula}">1098765432</td>
                                <td th:text="${n.alumno.nombre}">JUAN PEREZ</td>
                                <td th:text="${n.alumno.programa}">Ingenieria en Sistemas</td>
                                <td>
                                    <strong th:text="${n.puntajeGlobal}">200</strong>
                                    <br><small class="text-muted" th:text="${n.nivelSaberPro}">Nivel</small>
                                </td>
                                <td><span th:text="${n.ingles}">200</span> <small th:text="'(' + ${n.nivelIngles} + ')'" class="text-muted"></small></td>
                                <td><span th:if="${n.tipoExamen == 'SABER_PRO'}" th:text="${n.formulacionProyectos} + ' (' + ${n.nivelFormulacionProyectos} + ')'">200</span></td>
                                <td><span th:if="${n.tipoExamen == 'SABER_PRO'}" th:text="${n.pensamientoCientifico} + ' (' + ${n.nivelPensamientoCientifico} + ')'">200</span></td>
                                <td><span th:if="${n.tipoExamen == 'SABER_PRO'}" th:text="${n.disenoSoftware} + ' (' + ${n.nivelDisenoSoftware} + ')'">200</span></td>
                                <td>
                                    <span th:if="${n.publicado}" class="badge badge-aprobado" style="font-size:0.6rem;"><i class="fas fa-check"></i> Publicado</span>
                                    <span th:unless="${n.publicado}" class="badge badge-pendiente" style="font-size:0.6rem;"><i class="fas fa-clock"></i> Pendiente</span>
                                </td>
                                <td>
                                    <a th:href="@{/coordinador/alumnos/perfil/{id}(id=${n.alumno.id})}" class="btn btn-info btn-sm" title="Ver Perfil Completo"><i class="fas fa-external-link-alt"></i></a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(notas)}">
                                <td colspan="11" class="empty-state">
                                    <div class="empty-state-icon"><i class="fas fa-list-alt"></i></div>
                                    <h3>No hay registros</h3>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>
    </div>
</body>
</html>

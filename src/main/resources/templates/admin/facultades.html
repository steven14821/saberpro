<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Facultades')}"></head>
<body>
    <div th:replace="~{fragments/layout :: main(~{::section})}">
        <section th:fragment="section">
        <div class="card">
            <div class="card-header">
                <span class="card-title"><i class="fas fa-university"></i> Lista de Facultades</span>
                <button class="btn btn-primary" onclick="openModal('facultadModal')">
                    <i class="fas fa-plus"></i> Nueva Facultad
                </button>
            </div>
            <div class="card-body">
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Codigo</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="f : ${facultades}">
                                <td th:text="${f.id}">1</td>
                                <td th:text="${f.nombre}">Ingenieria</td>
                                <td th:text="${f.codigo}">ING</td>
                                <td>
                                    <div class="btn-group">
                                        <a th:href="@{/admin/facultades/editar/{id}(id=${f.id})}" class="btn btn-warning btn-sm">
                                            <i class="fas fa-edit"></i>
                                        </a>
                                        <a th:href="@{/admin/facultades/eliminar/{id}(id=${f.id})}" class="btn btn-danger btn-sm btn-delete-confirm">
                                            <i class="fas fa-trash"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(facultades)}">
                                <td colspan="4" class="empty-state">
                                    <div class="empty-state-icon"><i class="fas fa-university"></i></div>
                                    <h3>No hay facultades registradas</h3>
                                    <p>Haga clic en "Nueva Facultad" para comenzar</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Modal Form -->
        <div class="modal-overlay" id="facultadModal" style="display:none;">
            <div class="modal-content">
                <div class="modal-header">
                    <span class="modal-title" th:text="${facultad.id} ? 'Editar Facultad' : 'Nueva Facultad'">Nueva Facultad</span>
                    <button class="modal-close" onclick="closeModal('facultadModal')">&times;</button>
                </div>
                <form th:action="@{/admin/facultades/guardar}" th:object="${facultad}" method="post">
                    <div class="modal-body">
                        <input type="hidden" th:field="*{id}">
                        <div class="form-group">
                            <label class="form-label">Nombre *</label>
                            <input type="text" class="form-control" th:field="*{nombre}" required placeholder="Nombre de la facultad">
                            <span class="field-error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></span>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Codigo *</label>
                            <input type="text" class="form-control" th:field="*{codigo}" required placeholder="Codigo unico">
                            <span class="field-error" th:if="${#fields.hasErrors('codigo')}" th:errors="*{codigo}"></span>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" onclick="closeModal('facultadModal')">Cancelar</button>
                        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Guardar</button>
                    </div>
                </form>
            </div>
        </div>

        <script th:if="${facultad.id != null}">
            document.addEventListener('DOMContentLoaded', function() {
                openModal('facultadModal');
            });
        </script>
    </section>
    </div>
</body>
</html>
